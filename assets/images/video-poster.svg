<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#fbf6ee" />
      <stop offset="100%" stop-color="#e8dec8" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" />
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />

  <g opacity="0.35" fill="#a9b95f" stroke="#556238" stroke-width="1.2">
    <ellipse cx="120" cy="120" rx="42" ry="14" transform="rotate(-30 120 120)" />
    <ellipse cx="180" cy="180" rx="38" ry="12" transform="rotate(-30 180 180)" />
    <ellipse cx="60" cy="200" rx="34" ry="11" transform="rotate(-50 60 200)" />
    <ellipse cx="1160" cy="600" rx="42" ry="14" transform="rotate(150 1160 600)" />
    <ellipse cx="1100" cy="540" rx="38" ry="12" transform="rotate(150 1100 540)" />
    <ellipse cx="1220" cy="520" rx="34" ry="11" transform="rotate(130 1220 520)" />
  </g>

  <g transform="translate(640 320)">
    <circle r="86" fill="#556238" opacity="0.95" />
    <circle r="86" fill="none" stroke="#cad988" stroke-width="2" opacity="0.5" />
    <polygon points="-22,-32 -22,32 32,0" fill="#faf6ec" />
  </g>

  <g font-family="Georgia, 'Playfair Display', serif" text-anchor="middle" fill="#556238">
    <text x="640" y="470" font-size="42" font-style="italic">Il nostro video</text>
    <text x="640" y="520" font-size="20" font-family="'Source Sans 3', sans-serif" letter-spacing="6" opacity="0.65">PLACEHOLDER</text>
  </g>
</svg>
